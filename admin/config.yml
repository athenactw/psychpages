backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - label: "Settings"
    name: "settings"
    editor:
      preview: false
    files:
      - label: "Site Settings"
        name: "site_settings"
        file: "content/settings.json"
        format: "json"
        fields:
          - label: "Theme"
            name: "theme"
            widget: "object"
            fields:
              - { label: "Main color", name: "blueMain", widget: "color" }
              - { label: "Accent color", name: "blueAccent", widget: "color" }
              - { label: "Secondary color", name: "yellowSoft", widget: "color" }
              - { label: "Background color", name: "creamBg", widget: "color" }
              - { label: "Text color", name: "brownText", widget: "color" }
              - { label: "Decor color", name: "pinkShadow", widget: "color" }
              - { label: "Heading font stack", name: "fontHeading", widget: "string" }
              - { label: "Body font stack", name: "fontBody", widget: "string" }
              - { label: "Handwriting font stack", name: "fontHand", widget: "string" }
          - label: "Site copy"
            name: "site"
            widget: "object"
            fields:
              - { label: "Site title", name: "title", widget: "string" }
              - { label: "Sidebar subtitle", name: "subtitle", widget: "text" }
              - { label: "Hero title", name: "heroTitle", widget: "string" }
              - { label: "Hero intro", name: "heroIntro", widget: "text" }
              - { label: "Hero image URL", name: "heroImage", widget: "string", required: false }
              - { label: "About image URL", name: "aboutImage", widget: "string", required: false }
              - { label: "Pinned title", name: "pinnedTitle", widget: "string" }
              - { label: "Pinned excerpt", name: "pinnedExcerpt", widget: "text" }
              - { label: "Currently reading title", name: "currentlyReadingTitle", widget: "string" }
              - { label: "Currently reading body", name: "currentlyReadingBody", widget: "text" }
              - { label: "Newsletter text", name: "newsletterText", widget: "text" }
              - { label: "About title", name: "aboutTitle", widget: "string" }
              - { label: "About body", name: "aboutBody", widget: "text" }
              - label: "About highlights"
                name: "aboutHighlights"
                widget: "list"
                field: { label: "Highlight", name: "highlight", widget: "string" }
          - label: "Topic tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }
          - label: "Featured topics"
            name: "featuredTopics"
            widget: "list"
            field: { label: "Topic", name: "topic", widget: "string" }

  - label: "Posts"
    name: "posts"
    editor:
      preview: false
    files:
      - label: "All Posts"
        name: "posts_file"
        file: "content/posts.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Used in the post URL. Keep it lowercase-with-hyphens." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Read time", name: "readTime", widget: "string" }
              - { label: "Excerpt", name: "excerpt", widget: "text" }
              - { label: "Content", name: "content", widget: "text" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
              - { label: "Featured on home", name: "featured", widget: "boolean", default: false }

  - label: "Resources"
    name: "resources"
    editor:
      preview: false
    files:
      - label: "Reading Room Items"
        name: "resources_file"
        file: "content/resources.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Used internally. Keep it lowercase-with-hyphens." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }
