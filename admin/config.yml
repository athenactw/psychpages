backend:
  name: git-gateway
  branch: main

site_url: "/"
show_preview_links: false

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - label: "Settings"
    name: "settings"
    editor:
      preview: false
    files:
      - label: "Site Settings"
        name: "site_settings"
        file: "content/settings.json"
        format: "json"
        fields:
          - label: "Theme"
            name: "theme"
            widget: "object"
            fields:
              - { label: "Main color", name: "blueMain", widget: "color" }
              - { label: "Accent color", name: "blueAccent", widget: "color" }
              - { label: "Secondary color", name: "yellowSoft", widget: "color" }
              - { label: "Background color", name: "creamBg", widget: "color" }
              - { label: "Text color", name: "brownText", widget: "color" }
              - { label: "Decor color", name: "pinkShadow", widget: "color" }
              - { label: "Heading font stack", name: "fontHeading", widget: "string" }
              - { label: "Body font stack", name: "fontBody", widget: "string" }
              - { label: "Handwriting font stack", name: "fontHand", widget: "string" }
          - label: "Site copy"
            name: "site"
            widget: "object"
            fields:
              - { label: "Site title", name: "title", widget: "string" }
              - { label: "Sidebar subtitle", name: "subtitle", widget: "text" }
              - { label: "Hero title", name: "heroTitle", widget: "string" }
              - { label: "Hero intro", name: "heroIntro", widget: "text" }
              - { label: "Hero image URL", name: "heroImage", widget: "string", required: false }
              - { label: "About image URL", name: "aboutImage", widget: "string", required: false }
              - { label: "Pinned title", name: "pinnedTitle", widget: "string" }
              - { label: "Pinned excerpt", name: "pinnedExcerpt", widget: "text" }
              - { label: "Currently reading title", name: "currentlyReadingTitle", widget: "string" }
              - { label: "Currently reading body", name: "currentlyReadingBody", widget: "text" }
              - { label: "Newsletter text", name: "newsletterText", widget: "text" }
              - { label: "About title", name: "aboutTitle", widget: "string" }
              - { label: "About body", name: "aboutBody", widget: "text" }
              - label: "About highlights"
                name: "aboutHighlights"
                widget: "list"
                field: { label: "Highlight", name: "highlight", widget: "string" }
          - label: "Topic tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }
          - label: "Featured topics"
            name: "featuredTopics"
            widget: "list"
            field: { label: "Topic", name: "topic", widget: "string" }

  - label: "Posts"
    name: "posts"
    folder: "content/posts"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "title"
    slug: "{{fields.id}}"
    editor:
      preview: false
    summary: "{{title}}"
    fields:
      - { label: "Post ID", name: "id", widget: "string", hint: "Used in the post URL. Lowercase with hyphens only." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
      - { label: "Read time", name: "readTime", widget: "string", default: "5 min" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Cover image", name: "coverImage", widget: "image", required: false }
      - label: "Layout style"
        name: "layoutStyle"
        widget: "select"
        default: "essay"
        options:
          - { label: "Essay", value: "essay" }
          - { label: "Notebook", value: "notebook" }
          - { label: "Moodboard", value: "moodboard" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Featured on home", name: "featured", widget: "boolean", default: false }
      - { label: "Post body", name: "content", widget: "text" }

  - label: "Reading Room"
    name: "resources"
    folder: "content/resources"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "title"
    slug: "{{fields.id}}"
    editor:
      preview: false
    summary: "{{title}}"
    fields:
      - { label: "Resource ID", name: "id", widget: "string", hint: "Lowercase with hyphens only." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Type", name: "type", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Link", name: "link", widget: "string", required: false }
