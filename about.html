<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About | Athena's Psychology Pages</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="about">
    <div class="page-shell">
      <aside class="sidebar">
        <div class="sidebar-card brand-card">
          <p class="eyebrow">Psychology pages</p>
          <h1 id="siteTitle"></h1>
          <p id="siteSubtitle" class="brand-copy"></p>
        </div>

        <nav class="sidebar-card tab-nav" aria-label="Primary">
          <a class="tab-link" data-nav="home" href="./index.html">Hub</a>
          <a class="tab-link" data-nav="about" href="./about.html">About Me</a>
          <a class="tab-link" data-nav="threads" href="./threads.html">Threads</a>
          <a class="tab-link" data-nav="reading-room" href="./reading-room.html">Reading Room</a>
        </nav>

        <section class="sidebar-card tiny-stack">
          <p class="eyebrow">Favourite topics</p>
          <div id="topicPills" class="pill-wrap"></div>
        </section>

        <section class="sidebar-card tiny-stack">
          <p class="eyebrow">Currently reading</p>
          <div id="sidebarReading"></div>
        </section>

        <section class="sidebar-card tiny-stack">
          <p class="eyebrow">Pinned note</p>
          <div id="sidebarPinned"></div>
        </section>
      </aside>

      <main class="content-shell">
        <section class="scrapbook-card page-title-card">
          <p class="eyebrow">About me</p>
          <h2>Reflective, research-minded, and building a polished student portfolio</h2>
        </section>

        <section class="scrapbook-card about-layout">
          <div class="photo-frame">
            <img id="aboutImage" alt="About image placeholder" />
            <span class="frame-note">replace with your own photo</span>
          </div>
          <div class="about-copy">
            <p class="eyebrow">Athena</p>
            <h2 id="aboutTitle"></h2>
            <p id="aboutBody"></p>
            <div id="aboutHighlights" class="highlights-list"></div>
          </div>
        </section>
      </main>
    </div>

    <a class="admin-toggle" href="./admin/" aria-label="Open admin login">Admin</a>

    <script src="./script.js"></script>
  </body>
</html>
